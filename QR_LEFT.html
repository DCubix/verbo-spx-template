<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEFT</title>

    <script type="text/javascript" src="js/anime.umd.min.js"></script>
    <script type="text/javascript" src="js/spx_interface.js"></script>
    <script type="text/javascript" src="js/utils.js"></script>
    <script type="text/javascript" src="js/qrcode.min.js"></script>

    <link rel="stylesheet" href="css/styles.css" />

    <style>
        .SPXWindow {
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            position: absolute;
        }

        #gfx {
            opacity: 0;
            z-index: 10;
            position: relative;
            bottom: 8vh;
            left: 8vw;
            transform-origin: bottom left;
            height: 13vh;
        }

        #image {
            opacity: 0;
            position: relative;
            left: -1.5em;
            top: -5em;
            width: 14vw;
            height: 19vh;
            background-color: white;
            background-size: 250%;
            background-position: 0% 0%;
            border-radius: 1.5vw;
            transform: skewX(-12deg) translateX(-20%) translateY(-20%);
            filter: drop-shadow(0.4em 0.4em 10px rgba(0, 0, 0, 0.3));
            overflow: hidden;
            z-index: 11;
        }

        #image > * {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform: skewX(12deg) scale(0.8);
        }

        #card {
            position: absolute;
            left: 0;
            top: 0;
            background-image: url('assets/bg.png');
            background-size: 150%;
            background-position: center;
            border-radius: 1.5vw;
            transform: skewX(-12deg);
            height: 100%;
            padding-left: 14vw;
            padding-right: 2vw;
            padding-top: 1.2vh;
            padding-bottom: 1.2vh;
            overflow: hidden;
        }

        #card-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            transform: skewX(12deg);
            height: 100%;
        }

        #title {
            opacity: 0;
            font-size: 2.2vw;
            font-weight: 700;
            line-height: 1.1;
        }

        #subtitle {
            opacity: 0;
            font-size: 1.4vw;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.7);
            line-height: 1.2;
        }
    </style>

    <script>
        const clipFull = 'inset(0% 0% 0% 0% round 1em)';
        const clipNone = 'inset(0% 100% 0% 0% round 1em)';

        function runTemplateUpdate() {
            e('title').innerText = getFieldValue('title_text');
            e('subtitle').innerText = getFieldValue('subtitle_text');

            const qrCode = new QRCode(e('image'), {
                text: getFieldValue('qr_text'),
                width: 512,
                height: 512,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            setTimeout(runAnimationIN, 50);
        }

        function runAnimationIN() {
            let tl = anime.createTimeline({
                easing: 'easeInOutQuad',
                duration: 1500
            })
            
            .add('#gfx', {
                opacity: [0, 1],
                easing: 'linear'
            }, 50)
            
            .add('#card', {
                clipPath: [clipNone, clipFull]
            }, 50)
            
            .add('#image', {
                opacity: [0, 1],
                translateX: ['-20%', '0%'],
                translateY: ['-20%', '0%'],
                skewX: ['-12deg', '-12deg'],
                duration: 500
            }, 150)
            
            .add('#title', {
                translateX: ['-100%', '0%'],
                opacity: [0, 1],
                duration: 800
            }, 300)
            .add('#subtitle', {
                translateX: ['-100%', '0%'],
                opacity: [0, 1],
                duration: 800
            }, 350);
        }

        function runAnimationOUT() {
            let tl = anime.createTimeline({
                easing: 'easeInOutQuad',
                duration: 1000
            })
            .add('#card', {
                clipPath: [clipFull, clipNone]
            }, 0)
            .add('#image', {
                opacity: [1, 0],
                translateX: ['0%', '-20%'],
                translateY: ['0%', '-20%'],
                skewX: ['-12deg', '-12deg'],
                duration: 500
            }, 250)
            .add('#title', {
                opacity: [1, 0],
                duration: 400
            }, 300)
            .add('#subtitle', {
                opacity: [1, 0],
                duration: 400
            }, 350);
        }

        window.SPXGCTemplateDefinition = {
            description: "Card (Left)",
            playserver: "OVERLAY",
            playchannel: "1",
            playlayer: "1",
            webplayout: "1",
            out: "manual",
            dataformat: "json",
            uicolor: "1",
            DataFields: [
                // QR Code
                {
                    field: "qr_text",
                    ftype: "textfield",
                    title: "Texto do QR Code",
                    value: ""
                },
                { ftype: "divider" },
                // Título
                {
                    field: "title_text",
                    ftype: "textfield",
                    title: "Texto do Título",
                    value: ""
                },
                // Subtítulo
                {
                    field: "subtitle_text",
                    ftype: "textfield",
                    title: "Texto do Subtítulo",
                    value: ""
                }
            ]
        };

        // window.addEventListener('load', () => {
        //     runTemplateUpdate();
        //     setTimeout(() => {
        //         runAnimationOUT();
        //     }, 5000);
        // });
    </script>
</head>
<body>
    <div class="SPXWindow">
        <div id="gfx">
            <div id="image">
            </div>
            <div id="card">
                <div id="card-content">
                    <span id="title">CARD TITLE</span>
                    <span id="subtitle">CARD SUBTITLE</span>
                </div>
            </div>
        </div>
    </div>

    <div class="hidden">
        <div data-info="qr code text" id="qr_text">QR Code Texto</div>
        <div data-info="title text" id="title_text">Titulo do Card</div>
        <div data-info="subtitle text" id="subtitle_text">Subtitulo mais longo do card</div>
    </div>
</body>
</html>
