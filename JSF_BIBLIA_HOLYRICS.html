<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSF - Bíblia - Holyrics</title>

    <script type="text/javascript" src="js/anime.umd.min.js"></script>
    <script type="text/javascript" src="js/spx_interface.js"></script>
    <script type="text/javascript" src="js/holyrics.js"></script>
    <script type="text/javascript" src="js/utils.js"></script>

    <link rel="stylesheet" href="css/styles.css" />

    <style>
        .SPXWindow {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            position: absolute;
        }

        #gfx {
            opacity: 0;
            z-index: 10;
            position: relative;
            bottom: 6vh;
            transform-origin: bottom center;
            width: 72vw;
            overflow: visible;
        }

        /* ── Card wrapper ── */
        #card-wrapper {
            position: relative;
            width: 100%;
            overflow: visible;
        }

        #card {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 20vh;
            background: #2c2c2c;
            overflow: hidden;
            top: 7px;
            left: 7px;
            clip-path: inset(-5% 105% -5% -5%);
            box-shadow: 0px 0px white, 0px 0px white, 0px 0px white, 0px 0px white, 0px 0px white, 0px 0px white, 0px 0px white;
        }

        #card-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            padding: 2vh 3.5vw;
            gap: 1vh;
        }

        /* ── Verse text ── */
        #verse-text {
            opacity: 0;
            font-size: 2.2vw;
            font-weight: 600;
            line-height: 1.35;
            color: rgba(255, 255, 255, 0.9);
            white-space: normal;
            word-break: break-word;
            flex: 1;
            overflow: hidden;
            text-align: justify;
        }

        /* ── Reference ── */
        #verse-ref {
            opacity: 0;
            font-size: 1.5vw;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.45);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            line-height: 1.2;
        }

        /* ── Bible icon ── */
        #bible-icon {
            opacity: 0;
            position: absolute;
            right: 3vw;
            top: 50%;
            transform: translateY(-50%);
            width: 5vw;
            height: 5vw;
            color: rgba(255, 255, 255, 0.1);
            pointer-events: none;
            user-select: none;
        }

        #bible-icon svg {
            width: 100%;
            height: 100%;
        }
    </style>

    <script>
        const clipFull = 'inset(-5% -5% -5% -5%)';
        const clipNone = 'inset(-5% 105% -5% -5%)';

        let pollTimer = null;
        let animating = false;

        // ── Apply Bible text to DOM (with cross-fade) ──
        let lastSignature = '';

        function applyBibleText(data) {
            const sig = data.reference + '|' + data.text;
            if (sig === lastSignature) return;
            lastSignature = sig;

            const vText = document.querySelector('#verse-text');
            const vRef = document.querySelector('#verse-ref');

            const currentOpacity = parseFloat(getComputedStyle(vText).opacity);
            if (currentOpacity === 0) {
                vText.innerText = data.text;
                vRef.innerText = data.reference;
                autoFitFont();
                return;
            }

            anime.createTimeline({ easing: 'easeInOutQuad', duration: 500 })
            .add('#verse-text', { opacity: [1, 0], translateY: ['0%', '-10%'], duration: 200 }, 0)
            .add('#verse-ref', { opacity: [1, 0], duration: 200 }, 0)
            .add('#verse-text', {
                opacity: [0, 1], translateY: ['10%', '0%'], duration: 250,
                onBegin: function () { vText.innerText = data.text; vRef.innerText = data.reference; autoFitFont(); }
            }, 230)
            .add('#verse-ref', { opacity: [0, 1], duration: 250 }, 250);
        }

        // ── Polling logic ──
        async function fetchHolyrics() {
            const data = await holyricsFetchBible({
                host: getFieldValue('holyrics_ip'),
                port: getFieldValue('holyrics_port')
            });
            if (data) {
                applyBibleText(data);
            }
        }

        const BASE_FONT_VW = 2.2;
        const MIN_FONT_VW = 1.3;

        function autoFitFont() {
            const vText = e('verse-text');
            const card = document.getElementById('card');
            if (!vText || !card) return;
            vText.style.fontSize = BASE_FONT_VW + 'vw';
            let fontSize = BASE_FONT_VW;
            const step = 0.1;
            while (fontSize > MIN_FONT_VW && vText.scrollHeight > vText.clientHeight + 2) {
                fontSize -= step;
                vText.style.fontSize = fontSize + 'vw';
            }
        }

        function runAnimationIN() {
            if (animating) return;
            animating = true;
            isVisible = true;

            let tl = anime.createTimeline({
                easing: 'easeInOutQuad',
                duration: 2200,
                onComplete: function () { animating = false; }
            })

            .add('#gfx', {
                opacity: [0, 1],
                easing: 'linear',
                duration: 300
            }, 50)

            // Card: clip-path reveal
            .add('#card', {
                clipPath: [clipNone, clipFull],
                duration: 1500
            }, 50)

            // Bible icon
            .add('#bible-icon', {
                opacity: [0, 1],
                scale: [0.7, 1],
                easing: 'easeOutBack',
                duration: 600
            }, 400)

            // Verse text
            .add('#verse-text', {
                opacity: [0, 1],
                translateX: ['-30%', '0%'],
                easing: 'easeOutQuad',
                duration: 600
            }, 500)

            // Reference
            .add('#verse-ref', {
                opacity: [0, 1],
                translateX: ['-30%', '0%'],
                easing: 'easeOutQuad',
                duration: 600
            }, 620)

            // Raise card
            .add('#card', {
                left: ['7px', '0px'],
                top: ['7px', '0px'],
                boxShadow: [
                    '0px 0px white, 0px 0px white, 0px 0px white, 0px 0px white, 0px 0px white, 0px 0px white, 0px 0px white',
                    '1px 1px white, 2px 2px white, 3px 3px white, 4px 4px white, 5px 5px white, 6px 6px white, 7px 7px white',
                ],
                duration: 450
            }, 1200);
        }

        function runAnimationOUT() {
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
            if (animating) return;
            animating = true;

            let tl = anime.createTimeline({
                easing: 'easeInOutQuad',
                duration: 1800,
                onComplete: function () { animating = false; }
            })

            // Text out
            .add('#verse-ref', {
                opacity: [1, 0],
                translateX: ['0%', '30%'],
                easing: 'easeInQuad',
                duration: 350
            }, 0)

            .add('#verse-text', {
                opacity: [1, 0],
                translateX: ['0%', '30%'],
                easing: 'easeInQuad',
                duration: 350
            }, 80)

            .add('#bible-icon', {
                opacity: [1, 0],
                scale: [1, 0.7],
                easing: 'easeInQuad',
                duration: 300
            }, 100)

            // Unraise card
            .add('#card', {
                left: ['0px', '7px'],
                top: ['0px', '7px'],
                boxShadow: [
                    '1px 1px white, 2px 2px white, 3px 3px white, 4px 4px white, 5px 5px white, 6px 6px white, 7px 7px white',
                    '0px 0px white, 0px 0px white, 0px 0px white, 0px 0px white, 0px 0px white, 0px 0px white, 0px 0px white',
                ],
                duration: 450
            }, 500)

            // Unreveal card
            .add('#card', {
                clipPath: [clipFull, clipNone],
                duration: 800
            }, 900)

            // Fade out
            .add('#gfx', {
                opacity: [1, 0],
                easing: 'linear',
                duration: 200
            }, 1050);
        }

        function runTemplateUpdate() {
            const interval = 250;

            if (pollTimer) clearInterval(pollTimer);
            fetchHolyrics();
            pollTimer = setInterval(fetchHolyrics, interval);

            setTimeout(runAnimationIN, 50);
        }

        window.SPXGCTemplateDefinition = {
            description: "JSF - Bíblia - Holyrics",
            playserver: "OVERLAY",
            playchannel: "1",
            playlayer: "1",
            webplayout: "1",
            out: "manual",
            dataformat: "json",
            uicolor: "3",
            DataFields: [
                {
                    field: "holyrics_ip",
                    ftype: "textfield",
                    title: "IP do Holyrics",
                    value: "172.17.0.1"
                },
                {
                    field: "holyrics_port",
                    ftype: "textfield",
                    title: "Porta do Holyrics",
                    value: "8080"
                }
            ]
        };

        // window.addEventListener('load', function () {
        //     runTemplateUpdate();
        // });
    </script>
</head>
<body>
    <div class="SPXWindow">
        <div id="gfx">
            <div id="card-wrapper">
                <div id="card">
                    <div id="card-content">
                        <span id="verse-text">Porque Deus amou o mundo de tal maneira que deu o seu Filho unigênito, para que todo aquele que nele crê não pereça, mas tenha a vida eterna.</span>
                        <span id="verse-ref">João 3:16</span>
                    </div>
                    <div id="bible-icon">
                        <svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 22h15v-2H6.012C5.55 19.988 5 19.805 5 19s.55-.988 1.012-1H21V4a2 2 0 0 0-2-2H6c-1.206 0-3 .799-3 3v14c0 2.201 1.794 3 3 3zM8 7h3V5h2v2h3v2h-3v6h-2V9H8V7z"/></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="hidden">
        <div data-info="holyrics ip" id="holyrics_ip">172.17.0.1</div>
        <div data-info="holyrics port" id="holyrics_port">8080</div>
    </div>
</body>
</html>
